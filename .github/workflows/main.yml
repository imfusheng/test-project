name: Build Geek Camera Monitor

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-windows:
    name: Build for Windows
    runs-on: windows-latest

    steps:
    - name: 拉取代码
      uses: actions/checkout@v4

    - name: 安装 Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: 安装 MinGW GCC (CGO 必须)
      uses: egor-tensin/setup-mingw@v2
      with:
        platform: x64

    - name: 初始化 Go 模块
      run: |
        if (!(Test-Path go.mod)) {
          go mod init mymonitor
        }
        go mod tidy
      shell: powershell

    - name: 编译
      run: |
        $env:CGO_ENABLED="1"
        $env:CC="gcc"
        go build -ldflags="-s -w" -o monitor.exe main.go
      shell: powershell

    - name: 上传产物
      uses: actions/upload-artifact@v4
      with:
        name: camera-monitor-windows
        path: monitor.exe
